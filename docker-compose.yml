version: '3.8'

services:
  # PostgreSQL Database (local development)
  postgres:
    image: postgres:16-alpine
    container_name: krisisar_postgres
    environment:
      POSTGRES_USER: krisisar
      POSTGRES_PASSWORD: krisisar123
      POSTGRES_DB: krisisar_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krisisar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for task queue)
  redis:
    image: redis:7-alpine
    container_name: krisisar_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: krisisar_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://krisisar:krisisar123@postgres:5432/krisisar_db
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: krisisar_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
